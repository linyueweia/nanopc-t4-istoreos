name: Build iStoreOS NanoPC-T4

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'
  push:
    branches: [ main ]
    paths:
      - '.config'
      - '.github/workflows/build-nanopc-t4.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        echo "=== 磁盘空间 (清理前) ==="
        df -h /
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
        sudo rm -rf /usr/share/swift /usr/local/graalvm /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium /usr/local/lib/node_modules
        sudo apt-get clean
        sudo docker rmi $(sudo docker images -q) 2>/dev/null || true
        echo "=== 磁盘空间 (清理后) ==="
        df -h /

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y install \
          ack antlr3 asciidoc autoconf automake autopoint binutils \
          bison build-essential bzip2 ccache cmake cpio curl \
          device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool \
          lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev \
          libtool libz-dev lrzsz mkisofs msmtp nano ninja-build p7zip \
          p7zip-full patch pkgconf python3 python3-pip \
          python3-ply python3-pyelftools python3-setuptools \
          qemu-utils rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev

    - name: Clone iStoreOS source
      run: |
        echo "=== 克隆 iStoreOS 源码 (istoreos-24.10) ==="
        git clone --depth 1 -b istoreos-24.10 https://github.com/istoreos/istoreos.git source
        echo "=== 源码大小 ==="
        du -sh source/

    - name: Update & install feeds
      working-directory: source
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply NanoPC-T4 config
      working-directory: source
      run: |
        echo "=== 应用配置 ==="
        cp $GITHUB_WORKSPACE/.config .config
        echo "目标设备:"
        grep "CONFIG_TARGET" .config
        make defconfig
        echo "=== 最终配置验证 ==="
        grep "CONFIG_TARGET_rockchip_armv8_DEVICE" .config || {
          echo "错误: 未找到 NanoPC-T4 设备配置!"
          exit 1
        }

    - name: Download packages
      working-directory: source
      run: |
        echo "=== 下载软件包 ==="
        make download -j8 V=s
        echo "=== 下载完成 ==="

    - name: Build firmware
      working-directory: source
      run: |
        echo "=== 开始编译 ==="
        echo "开始时间: $(date)"
        make -j2 V=s || make -j1 V=s
        echo "=== 编译完成 ==="
        echo "结束时间: $(date)"

    - name: Collect and verify firmware
      id: collect
      run: |
        echo "=== 收集编译产物 ==="
        # 使用绝对路径
        SOURCE_DIR="${GITHUB_WORKSPACE}/source"
        OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
        
        # 清理并创建输出目录
        rm -rf "$OUTPUT_DIR"
        mkdir -p "$OUTPUT_DIR"
        
        echo "源码目录: $SOURCE_DIR"
        echo "输出目录: $OUTPUT_DIR"
        
        # 查找所有固件文件 (使用多种模式)
        echo "=== 查找固件文件 ==="
        
        # 查找 .img.gz 文件
        find "$SOURCE_DIR/bin/targets/" -name "*.img.gz" -type f 2>/dev/null | while read f; do
          echo "找到: $f"
          cp "$f" "$OUTPUT_DIR/"
        done
        
        # 查找 .img 文件
        find "$SOURCE_DIR/bin/targets/" -name "*.img" -type f 2>/dev/null | while read f; do
          echo "找到: $f"
          cp "$f" "$OUTPUT_DIR/"
        done
        
        # 查找 .itb 文件 (内核)
        find "$SOURCE_DIR/bin/targets/" -name "*.itb" -type f 2>/dev/null | while read f; do
          echo "找到: $f"
          cp "$f" "$OUTPUT_DIR/"
        done
        
        # 查找 .bin 文件
        find "$SOURCE_DIR/bin/targets/" -name "*.bin" -type f 2>/dev/null | while read f; do
          echo "找到: $f"
          cp "$f" "$OUTPUT_DIR/"
        done
        
        # 如果没找到标准文件，尝试复制整个 targets 目录
        if [ -z "$(ls -A "$OUTPUT_DIR/" 2>/dev/null)" ]; then
          echo "=== 未找到标准固件文件，复制 targets 目录 ==="
          cp -rv "$SOURCE_DIR/bin/targets/"* "$OUTPUT_DIR/" 2>/dev/null || true
        fi
        
        # 验证输出
        echo "=== 输出目录内容 ==="
        ls -lhR "$OUTPUT_DIR/" 2>/dev/null | head -50
        
        echo "=== 输出目录大小 ==="
        du -sh "$OUTPUT_DIR/"
        
        # 检查是否有文件
        FILE_COUNT=$(find "$OUTPUT_DIR" -type f 2>/dev/null | wc -l)
        echo "文件总数: $FILE_COUNT"
        
        if [ "$FILE_COUNT" -eq 0 ]; then
          echo "错误: 输出目录为空!"
          echo "=== 检查源码目录结构 ==="
          ls -la "$SOURCE_DIR/bin/targets/" 2>/dev/null
          find "$SOURCE_DIR/bin/" -maxdepth 4 -type f -name "*.img*" 2>/dev/null | head -20
          exit 1
        fi
        
        # 设置输出变量
        echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
        echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: iStoreOS-NanoPC-T4-${{ github.run_id }}
        path: ${{ steps.collect.outputs.output_dir }}/
        retention-days: 30
        if-no-files-found: error

    - name: Upload firmware to release (optional)
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_id }}
        name: iStoreOS NanoPC-T4 Build ${{ github.run_id }}
        files: ${{ steps.collect.outputs.output_dir }}/*
        fail_on_unmatched_files: false
      continue-on-error: true

    - name: Build summary
      if: always()
      run: |
        echo "============================================"
        echo "  iStoreOS NanoPC-T4 编译结果"
        echo "============================================"
        echo "分支: istoreos-24.10"
        echo "目标: NanoPC-T4 (RK3399)"
        echo ""
        
        OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
        if [ -d "$OUTPUT_DIR" ] && [ "$(ls -A "$OUTPUT_DIR/" 2>/dev/null)" ]; then
          echo "✅ 固件文件:"
          ls -lh "$OUTPUT_DIR/" | head -20
          echo ""
          echo "✅ 固件已上传至 Artifacts"
          echo "下载地址: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "烧录命令:"
          echo "  cd output"
          echo "  gunzip *.img.gz"
          echo "  sudo dd if=*.img of=/dev/sdX bs=1M status=progress"
        else
          echo "❌ 未找到固件文件"
          echo "请检查编译日志"
          echo ""
          echo "可能原因:"
          echo "1. 磁盘空间不足"
          echo "2. 编译失败"
          echo "3. 输出目录路径错误"
        fi
