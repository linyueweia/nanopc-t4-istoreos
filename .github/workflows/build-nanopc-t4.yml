name: Build iStoreOS NanoPC-T4

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'
  push:
    branches: [ main ]
    paths:
      - '.config'
      - '.github/workflows/build-nanopc-t4.yml'

# ★ 关键: 给 GITHUB_TOKEN 添加 Release 写入权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        echo "=== 磁盘空间 (清理前) ==="
        df -h /
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
        sudo rm -rf /usr/share/swift /usr/local/graalvm /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium /usr/local/lib/node_modules
        sudo apt-get clean
        sudo docker rmi $(sudo docker images -q) 2>/dev/null || true
        echo "=== 磁盘空间 (清理后) ==="
        df -h /

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y install \
          ack antlr3 asciidoc autoconf automake autopoint binutils \
          bison build-essential bzip2 ccache cmake cpio curl \
          device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool \
          lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev \
          libtool libz-dev lrzsz mkisofs msmtp nano ninja-build p7zip \
          p7zip-full patch pkgconf python3 python3-pip \
          python3-ply python3-pyelftools python3-setuptools \
          qemu-utils rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev

    - name: Clone iStoreOS source
      run: |
        echo "=== 克隆 iStoreOS 源码 (istoreos-24.10) ==="
        git clone --depth 1 -b istoreos-24.10 https://github.com/istoreos/istoreos.git source
        echo "=== 源码大小 ==="
        du -sh source/

    - name: Update & install feeds
      working-directory: source
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply NanoPC-T4 config
      working-directory: source
      run: |
        echo "=== 应用配置 ==="
        cp $GITHUB_WORKSPACE/.config .config
        echo "目标设备:"
        grep "CONFIG_TARGET" .config
        make defconfig
        echo "=== 最终配置验证 ==="
        grep "CONFIG_TARGET_rockchip_armv8_DEVICE" .config || {
          echo "错误: 未找到 NanoPC-T4 设备配置!"
          exit 1
        }

    - name: Download packages
      working-directory: source
      run: |
        echo "=== 下载软件包 ==="
        make download -j8 V=s
        echo "=== 下载完成 ==="

    - name: Build firmware
      working-directory: source
      run: |
        echo "=== 开始编译 ==="
        echo "开始时间: $(date)"
        make -j2 V=s || make -j1 V=s
        echo "=== 编译完成 ==="
        echo "结束时间: $(date)"

    - name: Collect and verify firmware
      id: collect
      run: |
        echo "=== 收集编译产物 ==="
        SOURCE_DIR="${GITHUB_WORKSPACE}/source"
        OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
        
        rm -rf "$OUTPUT_DIR"
        mkdir -p "$OUTPUT_DIR"
        
        echo "源码目录: $SOURCE_DIR"
        echo "输出目录: $OUTPUT_DIR"
        
        # ★ 查找 bin/targets 下的所有文件
        echo "=== bin/targets 目录结构 ==="
        find "$SOURCE_DIR/bin/targets/" -maxdepth 4 -type f 2>/dev/null | head -50
        
        # ★ 查找所有 .img.gz 和 .img 文件（包括固件安装包）
        echo ""
        echo "=== 查找所有固件文件 ==="
        find "$SOURCE_DIR/bin/targets/" -type f \( \
          -name "*.img.gz" -o \
          -name "*.img" -o \
          -name "*.itb" -o \
          -name "*.bin" -o \
          -name "*.eflasher" -o \
          -name "*.sdcard" \
        \) 2>/dev/null | while read f; do
          SIZE=$(du -h "$f" | cut -f1)
          echo "找到 [$SIZE]: $(basename $f)"
          cp "$f" "$OUTPUT_DIR/"
        done
        
        echo ""
        echo "=== 输出目录内容 ==="
        ls -lh "$OUTPUT_DIR/" 2>/dev/null
        
        echo ""
        echo "=== 输出目录总大小 ==="
        du -sh "$OUTPUT_DIR/"
        
        FILE_COUNT=$(find "$OUTPUT_DIR" -type f 2>/dev/null | wc -l)
        echo "文件总数: $FILE_COUNT"
        
        if [ "$FILE_COUNT" -eq 0 ]; then
          echo "❌ 错误: 输出目录为空!"
          echo "=== 检查完整目录结构 ==="
          find "$SOURCE_DIR/bin/" -maxdepth 4 -type d 2>/dev/null
          exit 1
        fi
        
        echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT

    - name: Upload firmware to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_id }}
        name: "iStoreOS NanoPC-T4 Build ${{ github.run_id }}"
        body: |
          ## iStoreOS NanoPC-T4 固件
          
          - **源码分支**: istoreos-24.10
          - **目标设备**: NanoPC-T4 (RK3399)
          - **编译时间**: ${{ github.event.head_commit.timestamp }}
          - **触发方式**: ${{ github.event_name }}
          
          ### 烧录方法
          ```bash
          # 解压
          gunzip *.img.gz
          # 写入 SD 卡
          sudo dd if=*.img of=/dev/sdX bs=1M status=progress
          sync
          ```
        files: ${{ steps.collect.outputs.output_dir }}/*
        fail_on_unmatched_files: false
        make_latest: true

    - name: Build summary
      if: always()
      run: |
        echo "============================================"
        echo "  iStoreOS NanoPC-T4 编译结果"
        echo "============================================"
        echo "分支: istoreos-24.10"
        echo "目标: NanoPC-T4 (RK3399)"
        echo ""
        
        OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
        if [ -d "$OUTPUT_DIR" ] && [ "$(ls -A "$OUTPUT_DIR/" 2>/dev/null)" ]; then
          echo "固件文件:"
          ls -lh "$OUTPUT_DIR/"
          echo ""
          TAG="build-${{ github.run_id }}"
          echo "Release 地址: ${{ github.server_url }}/${{ github.repository }}/releases/tag/$TAG"
          echo "Actions 地址: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "烧录命令:"
          echo "  cd output && gunzip *.img.gz && sudo dd if=*.img of=/dev/sdX bs=1M status=progress"
        else
          echo "❌ 未找到固件文件"
        fi
