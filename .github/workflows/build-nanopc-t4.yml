name: Build iStoreOS NanoPC-T4

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # 每天凌晨4点(UTC)检查官方源码是否有更新

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Check for official source updates
      id: check_update
      run: |
        echo "=== 检查 iStoreOS 官方源码是否有更新 ==="
        echo "触发方式: ${{ github.event_name }}"
        
        # 手动触发时，强制编译，不检查更新
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "🔄 手动触发，强制编译"
          echo "skip=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        # 定时触发时，检查官方源码是否有更新
        LATEST_COMMIT=$(curl -s "https://api.github.com/repos/istoreos/istoreos/commits/istoreos-24.10" | grep '"sha"' | head -1 | cut -d'"' -f4)
        echo "官方最新 commit: $LATEST_COMMIT"
        
        LAST_COMMIT=$(cat $GITHUB_WORKSPACE/last_commit.txt 2>/dev/null || echo "")
        echo "上次编译 commit: $LAST_COMMIT"
        
        if [ "$LATEST_COMMIT" = "$LAST_COMMIT" ]; then
          echo "✅ 官方源码无更新，跳过编译"
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "🔄 官方源码有更新，开始编译"
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "$LATEST_COMMIT" > $GITHUB_WORKSPACE/last_commit.txt
        fi

    - name: Free disk space
      if: steps.check_update.outputs.skip != 'true'
      run: |
        echo "=== 磁盘空间 (清理前) ==="
        df -h /
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
        sudo rm -rf /usr/share/swift /usr/local/graalvm /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium /usr/local/lib/node_modules
        sudo apt-get clean
        sudo docker rmi $(sudo docker images -q) 2>/dev/null || true
        echo "=== 磁盘空间 (清理后) ==="
        df -h /

    - name: Install build dependencies
      if: steps.check_update.outputs.skip != 'true'
      run: |
        sudo apt-get update
        sudo apt-get -y install \
          ack antlr3 asciidoc autoconf automake autopoint binutils \
          bison build-essential bzip2 ccache cmake cpio curl \
          device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool \
          lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev \
          libtool libz-dev lrzsz mkisofs msmtp nano ninja-build p7zip \
          p7zip-full patch pkgconf python3 python3-pip \
          python3-ply python3-pyelftools python3-setuptools \
          qemu-utils rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev

    - name: Clone iStoreOS source
      if: steps.check_update.outputs.skip != 'true'
      run: |
        echo "=== 克隆 iStoreOS 源码 (istoreos-24.10) ==="
        git clone --depth 1 -b istoreos-24.10 https://github.com/istoreos/istoreos.git source
        echo "=== 源码大小 ==="
        du -sh source/

    - name: Update & install feeds
      if: steps.check_update.outputs.skip != 'true'
      working-directory: source
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply NanoPC-T4 config
      if: steps.check_update.outputs.skip != 'true'
      working-directory: source
      run: |
        echo "=== 应用配置 ==="
        cp $GITHUB_WORKSPACE/.config .config
        echo "目标设备:"
        grep "CONFIG_TARGET" .config
        make defconfig
        echo "=== 最终配置验证 ==="
        grep "CONFIG_TARGET_rockchip_armv8_DEVICE" .config || {
          echo "错误: 未找到 NanoPC-T4 设备配置!"
          exit 1
        }

    - name: Download packages
      if: steps.check_update.outputs.skip != 'true'
      working-directory: source
      run: |
        echo "=== 下载软件包 ==="
        make download -j8 V=s
        echo "=== 下载完成 ==="

    - name: Build firmware
      if: steps.check_update.outputs.skip != 'true'
      working-directory: source
      run: |
        echo "=== 开始编译 ==="
        echo "开始时间: $(date)"
        make -j2 V=s || make -j1 V=s
        echo "=== 编译完成 ==="
        echo "结束时间: $(date)"

    - name: Collect and verify firmware
      if: steps.check_update.outputs.skip != 'true'
      id: collect
      run: |
        echo "=== 收集编译产物 ==="
        SOURCE_DIR="${GITHUB_WORKSPACE}/source"
        OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
        
        rm -rf "$OUTPUT_DIR"
        mkdir -p "$OUTPUT_DIR"
        
        echo "源码目录: $SOURCE_DIR"
        echo "输出目录: $OUTPUT_DIR"
        
        echo "=== 查找所有固件文件 ==="
        
        # 先查找 .img 文件（未压缩），只取 squashfs 版本
        find "$SOURCE_DIR/bin/targets/" -type f -name "*.squashfs*.img" ! -name "*.img.gz" 2>/dev/null | head -1 | while read f; do
          SIZE=$(du -h "$f" | cut -f1)
          echo "找到 [$SIZE]: $(basename $f)"
          cp "$f" "$OUTPUT_DIR/"
        done
        
        # 如果没有 squashfs .img，尝试查找任意 .img
        if [ -z "$(ls -A "$OUTPUT_DIR/" 2>/dev/null)" ]; then
          find "$SOURCE_DIR/bin/targets/" -type f -name "*.img" ! -name "*.img.gz" 2>/dev/null | head -1 | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "找到 [$SIZE]: $(basename $f)"
            cp "$f" "$OUTPUT_DIR/"
          done
        fi
        
        # 如果没有 .img 文件，查找 .img.gz 并解压，只取 squashfs 版本
        if [ -z "$(ls -A "$OUTPUT_DIR/" 2>/dev/null)" ]; then
          echo "未找到未压缩固件，解压 .img.gz 文件..."
          find "$SOURCE_DIR/bin/targets/" -type f -name "*squashfs*.img.gz" 2>/dev/null | head -1 | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "解压 [$SIZE]: $(basename $f)"
            gunzip -k "$f"
            cp "${f%.gz}" "$OUTPUT_DIR/"
            rm -f "${f%.gz}"
          done
          # 如果没有 squashfs，取任意 .img.gz
          if [ -z "$(ls -A "$OUTPUT_DIR/" 2>/dev/null)" ]; then
            find "$SOURCE_DIR/bin/targets/" -type f -name "*.img.gz" 2>/dev/null | head -1 | while read f; do
              SIZE=$(du -h "$f" | cut -f1)
              echo "解压 [$SIZE]: $(basename $f)"
              gunzip -k "$f"
              cp "${f%.gz}" "$OUTPUT_DIR/"
              rm -f "${f%.gz}"
            done
          fi
        fi
        
        # 查找其他格式的固件
        find "$SOURCE_DIR/bin/targets/" -type f \( \
          -name "*.itb" -o \
          -name "*.bin" -o \
          -name "*.eflasher" -o \
          -name "*.sdcard" \
        \) 2>/dev/null | while read f; do
          SIZE=$(du -h "$f" | cut -f1)
          echo "找到 [$SIZE]: $(basename $f)"
          cp "$f" "$OUTPUT_DIR/"
        done
        
        echo ""
        echo "=== 输出目录内容 ==="
        ls -lh "$OUTPUT_DIR/" 2>/dev/null
        
        echo "=== 输出目录总大小 ==="
        du -sh "$OUTPUT_DIR/"
        
        FILE_COUNT=$(find "$OUTPUT_DIR" -type f 2>/dev/null | wc -l)
        echo "文件总数: $FILE_COUNT"
        
        if [ "$FILE_COUNT" -eq 0 ]; then
          echo "❌ 错误: 输出目录为空!"
          exit 1
        fi
        
        echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT

    - name: Upload firmware to GitHub Release
      if: steps.check_update.outputs.skip != 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_id }}
        name: "iStoreOS NanoPC-T4 Build ${{ github.run_id }}"
        body: |
          ## iStoreOS NanoPC-T4 固件
          
          - **源码分支**: istoreos-24.10
          - **目标设备**: NanoPC-T4 (RK3399)
          - **触发方式**: ${{ github.event_name == 'workflow_dispatch' && '手动触发' || '自动检测到官方源码更新' }}
          
          ### 烧录方法（USB 线刷，无需先装其他系统）
          1. 下载下方 `*.img` 文件
          2. NanoPC-T4 按住 Recovery 按钮，用 Type-C USB 线连接电脑
          3. 打开 RKDevTool → Upgrade Firmware → 选择下载的 img 文件
          4. 点击 Upgrade 等待刷入完成
        files: ${{ steps.collect.outputs.output_dir }}/*
        fail_on_unmatched_files: false
        make_latest: true

    - name: Update last commit hash
      if: steps.check_update.outputs.skip != 'true' && success()
      run: |
        echo "=== 更新上次编译 commit ==="
        cat $GITHUB_WORKSPACE/last_commit.txt

    - name: Build summary
      if: always()
      run: |
        SKIP="${{ steps.check_update.outputs.skip }}"
        
        if [ "$SKIP" = "true" ]; then
          echo "============================================"
          echo "  ✅ 官方源码无更新，跳过编译"
          echo "============================================"
          echo "官方最新 commit: $(cat $GITHUB_WORKSPACE/last_commit.txt 2>/dev/null)"
        else
          echo "============================================"
          echo "  iStoreOS NanoPC-T4 编译结果"
          echo "============================================"
          echo "分支: istoreos-24.10"
          echo "目标: NanoPC-T4 (RK3399)"
          echo ""
          
          OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
          if [ -d "$OUTPUT_DIR" ] && [ "$(ls -A "$OUTPUT_DIR/" 2>/dev/null)" ]; then
            echo "固件文件:"
            ls -lh "$OUTPUT_DIR/"
            echo ""
            TAG="build-${{ github.run_id }}"
            echo "Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/$TAG"
          else
            echo "❌ 未找到固件文件"
          fi
        fi
